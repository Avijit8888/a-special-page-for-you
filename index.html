<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>presence</title>
  <link rel="stylesheet" href="style.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400;1,500&family=Outfit:wght@200;300;400&display=swap" rel="stylesheet"/>
</head>
<body>
<!-- Firebase App -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>

<!-- Firestore -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <canvas id="canvas"></canvas>
  <div class="orb orb-a"></div>
  <div class="orb orb-b"></div>
  <div class="orb orb-c"></div>
  <div class="vignette"></div>

  <!-- GATE -->
  <div id="gate">
    <div id="gate-box">
      <div class="sigil" id="sigil">
        <div class="sigil-ring r1"></div>
        <div class="sigil-ring r2"></div>
        <div class="sigil-dot"></div>
      </div>
      <p class="gate-tag">this space is only for you</p>
      <h1 id="gate-title">she understands<br/><em>what you don't say</em></h1>
      <p class="gate-sub" id="gate-time-line"></p>
      <button id="enter-btn">
        <span>enter</span>
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 7h10M9 4l3 3-3 3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <p class="gate-visit" id="gate-visit"></p>
    </div>
  </div>

  <!-- MAIN -->
  <main id="app">

    <div id="topbar">
      <div id="avatar">
        <div class="av-pulse"></div>
        <div class="av-core">🌸</div>
      </div>
      <div id="name-block">
        <span id="her-name">she</span>
        <span id="her-status">here with you</span>
      </div>
      <span id="vcnt"></span>
    </div>

    <div id="feed-wrap">
      <div id="feed" role="log" aria-live="polite" aria-label="conversation"></div>
    </div>

    <div id="bar">
      <div id="composer">
        <textarea id="inp" placeholder="say something…" rows="1" maxlength="600" autocomplete="off" spellcheck="false"></textarea>
        <button id="sbtn" aria-label="send">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M3 8h10M10 4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
      <p id="hint">you don't have to explain yourself…</p>
    </div>

  </main>

  <script src="script.js"></script>
</body>
</html>
