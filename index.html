<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>She Remembers</title>
  <link rel="stylesheet" href="style.css" />
  <!-- Google Fonts: Cormorant Garamond (display) + DM Sans (body) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- Ambient background canvas (particles) -->
  <canvas id="ambient-canvas"></canvas>

  <!-- Radial glow layers -->
  <div class="glow glow-pink"></div>
  <div class="glow glow-blue"></div>

  <!-- Main wrapper -->
  <main id="app">

    <!-- Intro logo / sigil -->
    <div class="sigil" id="sigil">
      <div class="sigil-ring"></div>
      <div class="sigil-core"></div>
    </div>

    <!-- Message stream -->
    <section class="message-stream" id="message-stream" aria-live="polite">
      <!-- Messages injected by JS -->
    </section>

    <!-- Input zone -->
    <div class="input-zone" id="input-zone">
      <div class="input-wrapper">
        <textarea
          id="user-input"
          class="user-input"
          placeholder="Say something…"
          rows="1"
          maxlength="500"
          aria-label="Your message"
        ></textarea>
        <button id="send-btn" class="send-btn" aria-label="Send message">
          <span class="send-label">send</span>
          <svg class="send-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M5 12H19M19 12L13 6M19 12L13 18" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
      <p class="input-hint" id="input-hint">you don't have to explain yourself…</p>
    </div>

    <!-- Visit counter / memory indicator (subtle) -->
    <div class="memory-indicator" id="memory-indicator" aria-hidden="true">
      <span class="memory-dot"></span>
      <span class="memory-label" id="memory-label">first time here</span>
    </div>

  </main>

  <script src="script.js"></script>
</body>
</html>
